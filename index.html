<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Product Explorer</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">SPD</div>
        <div class="input-section">
            <input type="text" placeholder="Search" name="" id="" class="search-input js-search-input">
        </div>
        <section class="category-section js-category-section">
            <button class="category-btn js-category-btn">
                Category
            </button>
            <div class="category-options js-category-options disabled"></div>
            <div class="category-type js-category-type"></div>
        </section>
    </header>
    <section class="product-container js-product-container">
    </section>
    <script type="module" src="scripts/script.js"></script>
</body>
</html>
